syntax = "proto3";

package bedrockcloud.tasks.v1;

import "bedrockcloud/tasks/v1/task_types.proto";

option java_multiple_files = true;
option java_package = "de.bedrockcloud.proto.tasks.v1";

message CreateTaskRequest {
  bedrockcloud.tasks.v1.TaskDefinition task = 1;
}

message CreateTaskResponse {
  bedrockcloud.tasks.v1.TaskDefinition task = 1;
}

message DeleteTaskRequest {
  bedrockcloud.tasks.v1.TaskDefinition task = 1;
}

message DeleteTaskResponse {
  bedrockcloud.tasks.v1.TaskDefinition task = 1;
}

message GetAllTasksRequest {}

message GetAllTasksResponse {
  repeated bedrockcloud.tasks.v1.TaskDefinition tasks = 1;
}

message GetByNameRequest {
  string name = 1;
}

message GetByTemplateRequest {
  bedrockcloud.tasks.v1.TaskDefinition template = 1;
}

message GetByTemplateResponse {
  repeated bedrockcloud.tasks.v1.TaskDefinition tasks = 1;
}

message GetByNameResponse {
  bedrockcloud.tasks.v1.TaskDefinition task = 1;
}

message GetAllTemplatesRequest {}

message GetAllTemplatesResponse {
  repeated bedrockcloud.tasks.v1.TaskDefinition templates = 1;
}

message UpdateTaskRequest {
  bedrockcloud.tasks.v1.TaskDefinition task = 1;
}

message UpdateTaskResponse {
  bedrockcloud.tasks.v1.TaskDefinition task = 1;
}

service TasksAPIService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc GetAllTasks(GetAllTasksRequest) returns (GetAllTasksResponse);
  rpc GetByName(GetByNameRequest) returns (GetByNameResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
}
